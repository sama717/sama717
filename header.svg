<svg width="680" height="120" viewBox="0 0 680 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .name {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 52px;
        font-weight: 400;
        fill: #f0f0f0;
        letter-spacing: -1px;
      }
      .role {
        font-family: 'Courier New', monospace;
        font-size: 11px;
        fill: #666;
        letter-spacing: 3px;
        text-transform: uppercase;
      }
      .line {
        stroke: #f0f0f0;
        stroke-width: 1;
        stroke-dasharray: 80;
        stroke-dashoffset: 80;
        animation: drawLine 0.8s 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
      }
      .name-text {
        opacity: 0;
        animation: fadeSlide 0.7s 0.1s cubic-bezier(0.16,1,0.3,1) forwards;
      }
      .role-text {
        opacity: 0;
        animation: fadeSlide 0.7s 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
      }
      .cursor {
        fill: #28c840;
        animation: blink 1.1s step-end infinite;
      }
      @keyframes drawLine {
        to { stroke-dashoffset: 0; }
      }
      @keyframes fadeSlide {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </defs>
  <rect width="680" height="120" fill="#0d1117"/>
  <text x="0" y="62" class="name name-text">Sama Farag</text>
  <line x1="0" y1="74" x2="80" y2="74" class="line"/>
  <text x="0" y="96" class="role role-text">Full-Stack Engineer · UI/UX Designer</text>
  <rect x="370" y="84" width="7" height="13" class="cursor"/>
</svg>
